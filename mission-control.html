<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MISSION CONTROL — AI Agent Dashboard</title>
<meta name="description" content="Cyberpunk mission control dashboard for AI agent fleets. Real-time monitoring, cron jobs, system vitals. Open source.">
<script src="https://cdn.jsdelivr.net/npm/tsparticles-slim@2.12.0/tsparticles.slim.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="config.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap');

  :root {
    --bg-dark: #0a0e1a;
    --bg-panel: #111827;
    --bg-panel-alt: #0d1525;
    --border: #1e3a5f;
    --cyan: #00d4ff;
    --cyan-dim: #0088aa;
    --orange: #ff6b2b;
    --orange-dim: #a04010;
    --green: #00ff88;
    --red: #ff3355;
    --yellow: #ffd700;
    --text: #c0d8f0;
    --text-dim: #5a7a9a;
    --pixel-shadow: 2px 2px 0px rgba(0,0,0,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    overflow-x: hidden;
    min-height: 100vh;
  }

  #tsparticles { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; }

  /* CRT Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* Floor glow */
  .floor-glow {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--cyan), var(--orange), var(--green), var(--yellow), var(--cyan));
    background-size: 400% 100%;
    animation: floorGlow 8s linear infinite;
    z-index: 100;
  }
  @keyframes floorGlow {
    0% { background-position: 0% 50%; }
    100% { background-position: 400% 50%; }
  }

  .app-wrapper {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ─────────────────────────────────── */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: rgba(17,24,39,0.92);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    z-index: 10;
  }
  .top-bar .brand {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    color: var(--cyan);
    text-shadow: 0 0 10px var(--cyan);
  }
  .top-bar .center-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: var(--orange);
    letter-spacing: 2px;
  }
  .top-bar .right-info {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
  }
  .gateway-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--green); }
    50% { opacity: 0.6; box-shadow: 0 0 12px var(--green); }
  }
  .clock { color: var(--yellow); font-family: 'Share Tech Mono', monospace; font-size: 16px; }

  /* ── TAB NAV ─────────────────────────────────── */
  .tab-nav {
    display: flex;
    gap: 0;
    background: rgba(13,21,37,0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  .tab-btn {
    padding: 10px 20px;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: var(--text-dim);
    background: transparent;
    border: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.3s;
    letter-spacing: 1px;
  }
  .tab-btn:hover { color: var(--cyan); }
  .tab-btn.active {
    color: var(--cyan);
    border-bottom-color: var(--cyan);
    text-shadow: 0 0 8px var(--cyan);
  }

  /* ── TICKER ──────────────────────────────────── */
  .ticker-bar {
    background: rgba(17,24,39,0.8);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    height: 24px;
    display: flex;
    align-items: center;
  }
  .ticker-content {
    display: inline-block;
    white-space: nowrap;
    animation: ticker 30s linear infinite;
    font-size: 14px;
    color: var(--orange);
    font-family: 'Press Start 2P', monospace;
    letter-spacing: 1px;
  }
  @keyframes ticker {
    0% { transform: translateX(100vw); }
    100% { transform: translateX(-100%); }
  }

  /* ── TAB CONTENT ─────────────────────────────── */
  .tab-content { display: none; flex: 1; overflow-y: auto; }
  .tab-content.active { display: flex; flex-direction: column; }

  /* ── PANELS / GLASSMORPHISM ──────────────────── */
  .panel {
    background: rgba(17,24,39,0.7);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    backdrop-filter: blur(10px);
    margin-bottom: 10px;
  }
  .panel-header {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: var(--cyan);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(0,212,255,0.2);
  }

  /* ── STATUS DOTS ─────────────────────────────── */
  .status-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-right: 6px;
    flex-shrink: 0;
  }
  .status-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
  .status-dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .status-dot.dim { background: var(--text-dim); box-shadow: none; }
  @keyframes flickerDot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── CHANNEL TAGS ────────────────────────────── */
  .ch-tag {
    display: inline-block;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 3px 6px;
    border-radius: 3px;
    margin-right: 3px;
  }
  .ch-tag.tg { background: #0088cc33; color: #0088cc; border: 1px solid #0088cc55; }
  .ch-tag.wa { background: #25d36633; color: #25d366; border: 1px solid #25d36655; }
  .ch-tag.slack { background: #4a154b33; color: #e0a0e8; border: 1px solid #4a154b88; }
  .ch-tag.api { background: #ff6b2b22; color: var(--orange); border: 1px solid #ff6b2b44; }
  .ch-tag.discord { background: #5865f222; color: #5865f2; border: 1px solid #5865f244; }

  /* ═══════════════════════════════════════════════
     TAB 1: DASHBOARD
     ═══════════════════════════════════════════════ */
  .dashboard-layout {
    display: grid;
    grid-template-columns: 280px 1fr 280px;
    gap: 12px;
    padding: 12px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
  }
  @media (max-width: 1100px) {
    .dashboard-layout { grid-template-columns: 1fr; }
  }

  /* Agent Roster */
  .roster-section { overflow-y: auto; max-height: calc(100vh - 140px); }
  .tier-group { margin-bottom: 12px; }
  .tier-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--orange);
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .agent-card {
    background: rgba(17,24,39,0.6);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .agent-card:hover {
    border-color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,212,255,0.15);
  }
  .agent-card.premium {
    border-image: linear-gradient(135deg, var(--cyan), var(--orange), var(--green)) 1;
  }
  .agent-card.premium:hover {
    animation: premiumBorder 2s linear infinite;
  }
  @keyframes premiumBorder {
    0% { border-color: var(--cyan); }
    33% { border-color: var(--orange); }
    66% { border-color: var(--green); }
    100% { border-color: var(--cyan); }
  }
  .agent-card-top {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .agent-card-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: var(--cyan);
  }
  .agent-card-model {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .agent-card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .agent-card-skills {
    font-size: 13px;
    color: var(--yellow);
  }
  .agent-card-heartbeat {
    font-size: 13px;
    color: var(--text-dim);
  }
  .agent-card-last {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Hero Stats */
  .hero-stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 12px;
  }
  .hero-stat {
    background: rgba(17,24,39,0.7);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 10px;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  .hero-stat-value {
    font-family: 'Press Start 2P', monospace;
    font-size: 28px;
    color: var(--cyan);
    text-shadow: 0 0 12px var(--cyan);
    margin-bottom: 6px;
  }
  .hero-stat-value.orange { color: var(--orange); text-shadow: 0 0 12px var(--orange); }
  .hero-stat-value.green { color: var(--green); text-shadow: 0 0 12px var(--green); }
  .hero-stat-value.yellow { color: var(--yellow); text-shadow: 0 0 12px var(--yellow); }
  .hero-stat-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* Cron Grid */
  .cron-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  @media (max-width: 900px) { .cron-grid { grid-template-columns: 1fr; } }
  .cron-card {
    background: rgba(17,24,39,0.6);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    border-top: 3px solid var(--green);
  }
  .cron-card.error { border-top-color: var(--red); }
  .cron-agent {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--cyan);
    margin-bottom: 4px;
  }
  .cron-name {
    font-weight: bold;
    font-size: 16px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .cron-last {
    font-size: 14px;
    color: var(--text-dim);
  }
  .cron-status-line {
    font-size: 13px;
    margin-top: 4px;
  }
  .cron-status-line.ok { color: var(--green); }
  .cron-status-line.err { color: var(--red); }

  /* Right panels */
  .right-col { overflow-y: auto; max-height: calc(100vh - 140px); }
  .vitals-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    padding: 4px 0;
    border-bottom: 1px solid rgba(30,58,95,0.3);
  }
  .vitals-label { color: var(--text-dim); }
  .vitals-value { color: var(--text); }
  .gauge-container {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 8px;
  }
  .gauge-container canvas { max-width: 120px; max-height: 80px; }

  .channel-row, .provider-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(30,58,95,0.3);
    font-size: 15px;
  }
  .channel-left, .provider-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .channel-icon { font-size: 16px; }
  .provider-badge {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(0,212,255,0.15);
    color: var(--cyan);
  }
  .provider-badge.active { background: rgba(0,255,136,0.15); color: var(--green); }
  .provider-badge.local { background: rgba(255,215,0,0.15); color: var(--yellow); }

  .revenue-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(30,58,95,0.3);
    font-size: 15px;
  }
  .revenue-icon { font-size: 16px; margin-right: 8px; }

  /* RAM bar */
  .ram-bar-outer {
    width: 100%;
    height: 8px;
    background: rgba(30,58,95,0.4);
    border-radius: 4px;
    overflow: hidden;
    margin: 6px 0;
  }
  .ram-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--yellow));
    border-radius: 4px;
    transition: width 0.5s;
  }

  /* ═══════════════════════════════════════════════
     TAB 2: SOLAR SYSTEM
     ═══════════════════════════════════════════════ */
  .solar-layout {
    flex: 1;
    display: flex;
    position: relative;
    overflow: hidden;
  }
  .solar-canvas-wrap {
    flex: 1;
    position: relative;
  }
  #solarCanvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  #solarCanvas:active { cursor: grabbing; }

  .solar-hud {
    position: absolute;
    top: 10px; left: 10px;
    display: flex;
    gap: 20px;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: var(--text-dim);
    z-index: 5;
    pointer-events: none;
  }
  .solar-hud span { color: var(--cyan); }

  .solar-sidebar {
    width: 240px;
    background: rgba(17,24,39,0.9);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
    backdrop-filter: blur(12px);
  }
  .solar-sidebar-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: var(--orange);
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .orbital-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 4px;
    border-bottom: 1px solid rgba(30,58,95,0.3);
    cursor: pointer;
    font-size: 15px;
    transition: background 0.2s;
  }
  .orbital-item:hover { background: rgba(0,212,255,0.05); }
  .orbital-item .planet-name { color: var(--text); flex: 1; }
  .orbital-badge {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 2px 5px;
    border-radius: 3px;
  }
  .orbital-badge.active-badge { background: rgba(0,255,136,0.2); color: var(--green); }
  .orbital-badge.idle-badge { background: rgba(90,122,154,0.2); color: var(--text-dim); }

  .solar-info-panel {
    position: absolute;
    top: 50px; right: 260px;
    width: 260px;
    background: rgba(17,24,39,0.92);
    border: 1px solid var(--cyan);
    border-radius: 8px;
    padding: 16px;
    backdrop-filter: blur(14px);
    display: none;
    z-index: 6;
    box-shadow: 0 0 20px rgba(0,212,255,0.2);
  }
  .solar-info-panel.visible { display: block; }
  .solar-info-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 15px;
    color: var(--cyan);
    margin-bottom: 4px;
  }
  .solar-info-role { color: var(--text-dim); font-size: 15px; margin-bottom: 10px; }
  .solar-info-row {
    display: flex;
    justify-content: space-between;
    font-size: 15px;
    padding: 3px 0;
  }
  .solar-info-row .label { color: var(--text-dim); }
  .solar-info-row .value { color: var(--text); }

  .solar-controls {
    position: absolute;
    bottom: 50px; right: 260px;
    display: flex;
    gap: 8px;
    z-index: 5;
  }
  .solar-ctrl-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 6px 10px;
    background: rgba(17,24,39,0.8);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .solar-ctrl-btn:hover { border-color: var(--cyan); color: var(--cyan); }
  .solar-ctrl-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,212,255,0.1); }

  .solar-log {
    position: absolute;
    bottom: 0; left: 0; right: 240px;
    height: 40px;
    background: rgba(10,14,26,0.9);
    border-top: 1px solid var(--border);
    overflow: hidden;
    padding: 4px 12px;
    font-size: 14px;
    color: var(--text-dim);
    z-index: 5;
  }
  .solar-log-line { white-space: nowrap; animation: logScroll 20s linear; }
  .solar-log-line .agent-label { color: var(--cyan); margin-right: 8px; }

  /* ═══════════════════════════════════════════════
     TAB 3: QUEST LOG
     ═══════════════════════════════════════════════ */
  .quest-layout { padding: 12px; overflow-y: auto; flex: 1; }
  .quest-2col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  @media (max-width: 800px) { .quest-2col { grid-template-columns: 1fr; } }
  .quest-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(30,58,95,0.2);
    font-size: 15px;
  }
  .quest-agent-name { color: var(--cyan); cursor: pointer; }
  .quest-agent-name:hover { text-decoration: underline; }
  .quest-time { color: var(--text-dim); margin-left: auto; font-size: 14px; }
  .quest-ok { color: var(--green); font-family: 'Press Start 2P', monospace; font-size: 10px; }
  .quest-err { color: var(--red); font-family: 'Press Start 2P', monospace; font-size: 10px; }
  .action-line {
    font-size: 15px;
    padding: 4px 0;
    border-bottom: 1px solid rgba(30,58,95,0.15);
  }
  .action-time { color: var(--text-dim); margin-right: 8px; }
  .action-agent { color: var(--cyan); margin-right: 6px; }
  .achievement-agent {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--orange);
    margin-top: 8px;
    margin-bottom: 4px;
  }
  .achievement-item { font-size: 15px; padding: 2px 0; color: var(--text-dim); }
  .change-line { font-size: 15px; padding: 3px 0; border-bottom: 1px solid rgba(30,58,95,0.15); }
  .change-time { color: var(--text-dim); margin-right: 8px; }
  .change-file { color: var(--yellow); }

  /* ═══════════════════════════════════════════════
     TAB 4: ROADMAP
     ═══════════════════════════════════════════════ */
  .roadmap-layout { padding: 16px; overflow-y: auto; flex: 1; }
  .roadmap-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    color: var(--orange);
    text-align: center;
    margin-bottom: 20px;
    letter-spacing: 2px;
  }
  .roadmap-card {
    background: rgba(17,24,39,0.7);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
    backdrop-filter: blur(10px);
  }
  .roadmap-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: #fff;
  }
  .roadmap-progress-bar-outer {
    height: 6px;
    background: rgba(30,58,95,0.4);
  }
  .roadmap-progress-bar-inner {
    height: 100%;
    transition: width 0.5s;
  }
  .roadmap-items { padding: 12px 16px; }
  .roadmap-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-size: 16px;
  }
  .roadmap-item.done .ri-prefix { color: var(--green); }
  .roadmap-item.active .ri-prefix { color: var(--orange); }
  .roadmap-item.pending .ri-prefix { color: var(--text-dim); }
  .roadmap-item.pending .ri-text { color: var(--text-dim); opacity: 0.6; }
  .ri-prefix { font-weight: bold; width: 14px; }
  .ri-text { flex: 1; }
  .ri-assignee { color: var(--text-dim); font-size: 14px; }

  .total-progress {
    background: rgba(17,24,39,0.7);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  .total-progress-label {

const C = (typeof CONFIG !== 'undefined') ? CONFIG : DEMO;

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const startTime = Date.now();

function timeAgo(min) {
  if (min < 60) return min + 'm ago';
  return Math.floor(min/60) + 'h ago';
}

function randomMsg() {
  const msgs = [
    'Processing pipeline...', 'Scanning endpoints...', 'Analyzing data streams...',
    'Generating report...', 'Optimizing parameters...', 'Running diagnostics...',
    'Checking health status...', 'Updating knowledge base...', 'Syncing channels...',
    'Evaluating metrics...', 'Deploying updates...', 'Monitoring traffic...',
    'Crunching numbers...', 'Fetching market data...', 'Training model...',
    'Indexing documents...', 'Scheduling tasks...', 'Resolving dependencies...',
  ];
  return msgs[Math.floor(Math.random() * msgs.length)];
}

// per-agent simulated "ago" and "lastMsg"
const agentState = {};
C.agents.forEach(a => {
  agentState[a.id] = {
    ago: Math.floor(Math.random() * 120),
    lastMsg: randomMsg(),
  };
});

function channelClass(ch) {
  const c = ch.toUpperCase();
  if (c === 'TG' || c === 'TELEGRAM') return 'tg';
  if (c === 'WA' || c === 'WHATSAPP') return 'wa';
  if (c === 'SLACK') return 'slack';
  if (c === 'DISCORD') return 'discord';
  return 'api';
}

function statusDotClass(agent) {
  if (agent.status === 'active') return 'green';
  if (agent.status === 'idle') return 'yellow';
  if (agent.status === 'error') return 'red';
  return 'dim';
}

function getUptime() {
  const s = Math.floor((Date.now() - startTime) / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return `${h}h ${m}m ${sec}s`;
}

// ═══════════════════════════════════════════════════════════
// TICKER
// ═══════════════════════════════════════════════════════════

  const active = C.agents.filter(a => a.status === 'active').length;
  const cronOk = C.crons.filter(c => c.status === 'ok').length;
  const cronErr = C.crons.filter(c => c.status === 'error').length;

// ═══════════════════════════════════════════════════════════

function renderRoster() {
  const tiers = { command: [], operations: [], support: [] };
  C.agents.forEach(a => {
    const t = a.tier || 'support';
    if (!tiers[t]) tiers[t] = [];
    tiers[t].push(a);
  });

  let html = '';
  for (const [tier, agents] of Object.entries(tiers)) {
    if (!agents.length) continue;
    html += `<div class="tier-group"><div class="tier-label">\u25B8 ${tier.toUpperCase()}</div>`;
    agents.forEach(a => {
      const st = agentState[a.id];
      const dotClass = statusDotClass(a);
      const premClass = a.premium ? ' premium' : '';
      const channels = (a.channels || []).map(c => `<span class="ch-tag ${channelClass(c)}">${c}</span>`).join('');

          <div class="agent-card-last" id="msg-${a.id}">${st.lastMsg}</div>

    });
    html += '</div>';

// -- Charts (RAM Gauge + Cron Donut) --
function drawGauges() {
  // RAM half-circle gauge
  const ramCtx = document.getElementById('ramGauge').getContext('2d');
  const ramPct = 0.62;
  const cw = 120, ch = 80;
  ramCtx.clearRect(0, 0, cw, ch);
  const cx = 60, cy = 70, r = 50;
  // background arc
  ramCtx.beginPath();
  ramCtx.arc(cx, cy, r, Math.PI, 0, false);
  ramCtx.lineWidth = 12;
  ramCtx.strokeStyle = 'rgba(30,58,95,0.5)';
  ramCtx.stroke();
  // filled arc
  const endAngle = Math.PI + ramPct * Math.PI;
  ramCtx.beginPath();
  ramCtx.arc(cx, cy, r, Math.PI, endAngle, false);
  ramCtx.lineWidth = 12;
  const grad = ramCtx.createLinearGradient(10, 0, 110, 0);
  grad.addColorStop(0, '#00ff88');
  grad.addColorStop(1, '#ffd700');
  ramCtx.strokeStyle = grad;
  ramCtx.stroke();
  // text
  ramCtx.fillStyle = '#c0d8f0';
  ramCtx.font = "bold 14px 'Share Tech Mono'";
  ramCtx.textAlign = 'center';
  ramCtx.fillText(Math.round(ramPct*100) + '%', cx, cy - 10);
  ramCtx.font = "8px 'Press Start 2P'";
  ramCtx.fillStyle = '#5a7a9a';
  ramCtx.fillText('RAM', cx, cy + 4);

  // Cron donut
  const cronCtx = document.getElementById('cronDonut').getContext('2d');
  cronCtx.clearRect(0, 0, cw, ch);
  const okCount = C.crons.filter(c => c.status === 'ok').length;
  const errCount = C.crons.filter(c => c.status === 'error').length;
  const disCount = C.crons.length - okCount - errCount;
  const total = C.crons.length || 1;
  const cx2 = 60, cy2 = 40, r2 = 30;
  let angle = -Math.PI / 2;
  const segments = [
    { count: okCount, color: '#00ff88' },
    { count: errCount, color: '#ff3355' },
    { count: disCount, color: '#5a7a9a' },
  ];
  segments.forEach(seg => {
    if (seg.count === 0) return;
    const sweep = (seg.count / total) * Math.PI * 2;
    cronCtx.beginPath();
    cronCtx.arc(cx2, cy2, r2, angle, angle + sweep, false);
    cronCtx.lineWidth = 10;
    cronCtx.strokeStyle = seg.color;
    cronCtx.stroke();
    angle += sweep;
  });
  cronCtx.fillStyle = '#c0d8f0';
  cronCtx.font = "bold 12px 'Share Tech Mono'";
  cronCtx.textAlign = 'center';
  cronCtx.fillText(okCount + '/' + total, cx2, cy2 + 4);
  cronCtx.font = "7px 'Press Start 2P'";
  cronCtx.fillStyle = '#5a7a9a';
  cronCtx.fillText('CRONS', cx2, cy2 + 18);
}
drawGauges();

// TAB 2: SOLAR SYSTEM (Three.js 3D)
// ═══════════════════════════════════════════════════════════
let solarInited = false;

function initSolarSystem() {
  if (solarInited) return;
  solarInited = true;
  initSolar3D();
}

function initSolar3D() {
  const container = document.getElementById('solarContainer');

  // Three.js scene
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, W / Math.max(H, 400), 0.1, 2000);
  camera.position.set(0, 45, 70);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(W, Math.max(H, 400));
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x020208);
  renderer.domElement.style.cursor = 'grab';
  container.insertBefore(renderer.domElement, container.firstChild);

  // Starfield
  const starsGeo = new THREE.BufferGeometry();
  const starPos = new Float32Array(5000 * 3);
  const starCol = new Float32Array(5000 * 3);
  for (let i = 0; i < 5000; i++) {
    starPos[i*3] = (Math.random()-0.5)*1200;
    starPos[i*3+1] = (Math.random()-0.5)*1200;
    starPos[i*3+2] = (Math.random()-0.5)*1200;
    const b = 0.3+Math.random()*0.7;
    starCol[i*3] = b; starCol[i*3+1] = b; starCol[i*3+2] = b;
  }
  starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  starsGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));
  scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ size: 0.8, vertexColors: true, transparent: true, opacity: 0.8 })));

  // Nebula
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(400, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0x0a1030, side: THREE.BackSide, transparent: true, opacity: 0.5 })
  ));

  // Orbit radii — spread agents across 4 tiers
  const tiers = { command: 1, operations: 2, support: 3 };
  const ORBIT_RADII = [0, 18, 34, 50, 65];
  const ORBIT_SPEEDS = [0, 0.03, 0.02, 0.012, 0.006];

  // Orbit rings
  for (let i = 1; i <= 3; i++) {
    const rGeo = new THREE.RingGeometry(ORBIT_RADII[i]-0.05, ORBIT_RADII[i]+0.05, 128);
    const rMat = new THREE.MeshBasicMaterial({ color: i<=1?0x1a3a5f:i<=2?0x122a4f:0x0a1a3f, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
    const r = new THREE.Mesh(rGeo, rMat);
    r.rotation.x = -Math.PI/2;
    scene.add(r);
  }

  // Central Sun
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xffd700 });
  const sun = new THREE.Mesh(new THREE.SphereGeometry(3, 32, 32), sunMat);
  scene.add(sun);
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(5, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.15 })));
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(7, 32, 32), new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.05 })));

  // Agent planets
  const agentMeshes = {};
  const agentLabels3D = [];
  let showLabels3D = true;

  // Assign orbit tiers and spread angles
  const tierCounts = { 1: 0, 2: 0, 3: 0 };
  C.agents.forEach(a => {
    const t = tiers[a.tier] || 2;
    tierCounts[t]++;
  });
  const tierIdx = { 1: 0, 2: 0, 3: 0 };

  C.agents.forEach(a => {
    const orbitTier = tiers[a.tier] || 2;
    const angleStep = (Math.PI * 2) / (tierCounts[orbitTier] || 1);
    const baseAngle = tierIdx[orbitTier] * angleStep;
    tierIdx[orbitTier]++;

    const group = new THREE.Group();
    const colorHex = parseInt(a.color.replace('#',''), 16);
    const planetSize = (a.size || 8) * 0.18;

    // Planet sphere
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(planetSize, 24, 24),
      new THREE.MeshBasicMaterial({ color: colorHex })
    );
    group.add(mesh);

    // Atmosphere glow
    group.add(new THREE.Mesh(
      new THREE.SphereGeometry(planetSize * 1.6, 16, 16),
      new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.15 })
    ));

    // Rings for Saturn-type
    if (a.rings) {
      const pRing = new THREE.Mesh(
        new THREE.RingGeometry(planetSize*1.6, planetSize*2.4, 32),
        new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.3, side: THREE.DoubleSide })
      );
      pRing.rotation.x = Math.PI/3;
      group.add(pRing);
    }

    // Position
    const radius = ORBIT_RADII[orbitTier];
    group.position.set(Math.cos(baseAngle)*radius, (Math.random()-0.5)*3, Math.sin(baseAngle)*radius);
    scene.add(group);

    // Cron satellites
    const agentCrons = C.crons.filter(cr => cr.agent.toUpperCase() === a.name.toUpperCase());
    const satMeshes = [];
    agentCrons.forEach((cr, ci) => {
      const satOrbit = planetSize + 1.5 + ci * 1.2;
      const satColor = cr.status === 'ok' ? 0x00ff88 : cr.status === 'error' ? 0xff3355 : 0x5a7a9a;
      const satMesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.2, 8, 8),
        new THREE.MeshBasicMaterial({ color: satColor })
      );
      const satGlow = new THREE.Mesh(
        new THREE.SphereGeometry(0.4, 8, 8),
        new THREE.MeshBasicMaterial({ color: satColor, transparent: true, opacity: 0.2 })
      );
      group.add(satMesh);
      group.add(satGlow);
      satMeshes.push({ mesh: satMesh, glow: satGlow, orbit: satOrbit, speed: 0.5 + ci * 0.3, idx: ci });
    });

    agentMeshes[a.id] = { group, agent: a, baseAngle, mesh, orbitTier, satellites: satMeshes };

    // Label sprite
    const labelCanvas = document.createElement('canvas');
    labelCanvas.width = 256; labelCanvas.height = 64;
    const lctx = labelCanvas.getContext('2d');
    lctx.font = 'bold 18px Share Tech Mono';
    lctx.fillStyle = a.color;
    lctx.textAlign = 'center';
    lctx.fillText(a.name, 128, 24);
    lctx.font = '12px Share Tech Mono';
    lctx.fillStyle = '#888888';
    lctx.fillText(a.role.substring(0, 30), 128, 44);
    const tex = new THREE.CanvasTexture(labelCanvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.8 }));
    sprite.scale.set(10, 2.5, 1);
    sprite.position.y = planetSize + 3;
    group.add(sprite);
    agentLabels3D.push(sprite);
  });

  // Message beams (shooting stars between planets)
  const activeBeams = [];
  function sendBeam(fromId, toId) {
    const from = agentMeshes[fromId], to = agentMeshes[toId];
    if (!from || !to) return;
    const start = from.group.position.clone();
    const end = to.group.position.clone();
    const mid = start.clone().add(end).multiplyScalar(0.5);
    mid.y += 8 + Math.random()*5;
    const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
    const colorHex = parseInt(from.agent.color.replace('#',''), 16);
    const geo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(40));
    const mat = new THREE.LineBasicMaterial({ color: colorHex, transparent: true, opacity: 0.8 });
    const line = new THREE.Line(geo, mat);
    scene.add(line);
    const particle = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
    const particleGlow = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.3 }));
    scene.add(particle); scene.add(particleGlow);
    activeBeams.push({ line, particle, particleGlow, curve, progress: 0, speed: 0.008+Math.random()*0.006, fadeStart: Date.now()+2000 });
  }

  // Periodic beams
  setInterval(() => {
    const ids = Object.keys(agentMeshes);
    if (ids.length >= 2) {
      const from = ids[Math.floor(Math.random()*ids.length)];
      let to = from;
      while (to === from) to = ids[Math.floor(Math.random()*ids.length)];
      sendBeam(from, to);
    }
  }, 2500);

  // Camera controls
  let cameraAngle = 0.3, cameraHeight = 45, cameraDist = 70;
  let autoRotate3D = true, isDragging3D = false, lastMouse3D = { x:0, y:0 };

  renderer.domElement.addEventListener('mousedown', e => { isDragging3D = true; lastMouse3D = { x: e.clientX, y: e.clientY }; renderer.domElement.style.cursor = 'grabbing'; });
  renderer.domElement.addEventListener('mousemove', e => {
    if (isDragging3D) {
      cameraAngle += (e.clientX - lastMouse3D.x) * 0.005;
      cameraHeight += (e.clientY - lastMouse3D.y) * 0.3;
      cameraHeight = Math.max(5, Math.min(100, cameraHeight));
      lastMouse3D = { x: e.clientX, y: e.clientY };
    }
    // Tooltip
    const mouse = new THREE.Vector2((e.clientX / renderer.domElement.clientWidth)*2-1, -(e.clientY / renderer.domElement.clientHeight)*2+1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    let found = null;
    for (const [id, data] of Object.entries(agentMeshes)) {
      if (raycaster.intersectObject(data.mesh).length > 0) { found = data; break; }
    }
    const tt = document.getElementById('solarTooltip');
    if (found) {
      document.getElementById('ttName').textContent = found.agent.name;
      document.getElementById('ttName').style.color = found.agent.color;
      document.getElementById('ttRole').textContent = found.agent.role;
      document.getElementById('ttStatus').innerHTML = `<span style="color:${found.agent.status==='active'?'#00ff88':'#ffd700'}">${found.agent.status.toUpperCase()}</span> | ${found.agent.model}`;
      tt.style.display = 'block';
      const rect = container.getBoundingClientRect();
      tt.style.left = (e.clientX - rect.left + 15) + 'px';
      tt.style.top = (e.clientY - rect.top - 10) + 'px';
    } else { tt.style.display = 'none'; }
  });
  renderer.domElement.addEventListener('mouseup', () => { isDragging3D = false; renderer.domElement.style.cursor = 'grab'; });
  renderer.domElement.addEventListener('wheel', e => { cameraDist += e.deltaY*0.05; cameraDist = Math.max(15, Math.min(150, cameraDist)); e.preventDefault(); }, { passive: false });

  // Controls buttons
  document.getElementById('btnResetCam').addEventListener('click', () => { cameraAngle = 0.3; cameraHeight = 45; cameraDist = 70; });
  document.getElementById('btnAutoRotate').addEventListener('click', () => {
    autoRotate3D = !autoRotate3D;
    document.getElementById('btnAutoRotate').classList.toggle('active', autoRotate3D);
  });
  document.getElementById('btnLabels').addEventListener('click', () => {
    showLabels3D = !showLabels3D;
    agentLabels3D.forEach(s => { s.visible = showLabels3D; });
    document.getElementById('btnLabels').classList.toggle('active', showLabels3D);
  });

  // HUD
  const active3D = C.agents.filter(a => a.status === 'active').length;
  document.getElementById('solarHud').innerHTML = `AGENTS: <span>${C.agents.length}</span> &nbsp; ACTIVE: <span>${active3D}</span> &nbsp; CRONS: <span>${C.crons.length}</span>`;

  // Orbital roster sidebar
  let olHtml = '';
  C.agents.forEach(a => {
    const badge = a.status==='active' ? '<span class="orbital-badge active-badge">ACTIVE</span>' : '<span class="orbital-badge idle-badge">IDLE</span>';
    olHtml += `<div class="orbital-item" data-agent="${a.id}"><span class="status-dot ${statusDotClass(a)}"></span><span class="planet-name">${a.name}</span>${badge}</div>`;
  });
  document.getElementById('orbitalList').innerHTML = olHtml;

  // Solar log
  function addLogLine() {
    const ag = C.agents[Math.floor(Math.random()*C.agents.length)];
    const line = document.createElement('div');
    line.className = 'solar-log-line';
    line.innerHTML = `<span class="agent-label">[${ag.name}]</span> ${randomMsg()}`;
    const log = document.getElementById('solarLog');
    log.appendChild(line);
    if (log.children.length > 3) log.removeChild(log.firstChild);
  }
  addLogLine();
  setInterval(addLogLine, 4000);

  // Resize
  window.addEventListener('resize', () => {
    const nw = container.clientWidth - 240, nh = container.clientHeight;
    camera.aspect = nw / Math.max(nh, 400);
    camera.updateProjectionMatrix();
    renderer.setSize(nw, Math.max(nh, 400));
  });

  // Animation loop
  const clock3D = new THREE.Clock();
  function animate3D() {
    requestAnimationFrame(animate3D);
    const t = clock3D.getElapsedTime();

    // Orbit planets
    for (const [id, data] of Object.entries(agentMeshes)) {
      const radius = ORBIT_RADII[data.orbitTier];
      const speed = ORBIT_SPEEDS[data.orbitTier];
      const angle = data.baseAngle + t * speed;
      data.group.position.x = Math.cos(angle) * radius;
      data.group.position.z = Math.sin(angle) * radius;
      data.group.position.y = Math.sin(t * 0.5 + data.baseAngle) * 1.5;

      // Animate cron satellites
      data.satellites.forEach(sat => {
        const sAngle = t * sat.speed + sat.idx * 1.2;
        sat.mesh.position.set(Math.cos(sAngle)*sat.orbit, Math.sin(sAngle*0.7)*sat.orbit*0.3, Math.sin(sAngle)*sat.orbit);
        sat.glow.position.copy(sat.mesh.position);
      });
    }

    // Sun pulse
    sun.scale.setScalar(1 + Math.sin(t*2)*0.05);

    // Camera
    if (autoRotate3D && !isDragging3D) cameraAngle += 0.002;
    camera.position.x = Math.cos(cameraAngle) * cameraDist;
    camera.position.z = Math.sin(cameraAngle) * cameraDist;
    camera.position.y = cameraHeight;
    camera.lookAt(0, 0, 0);

    // Animate beams
    for (let i = activeBeams.length-1; i >= 0; i--) {
      const b = activeBeams[i];
      b.progress += b.speed;
      if (b.progress >= 1) b.progress = 1;
      const point = b.curve.getPoint(b.progress);
      b.particle.position.copy(point);
      b.particleGlow.position.copy(point);
      const age = Date.now() - b.fadeStart;
      if (age > 0) {
        const fade = Math.max(0, 1 - age/2000);
        b.line.material.opacity = fade*0.6;
        b.particle.material.opacity = fade;
        b.particleGlow.material.opacity = fade*0.3;
        if (fade <= 0) {
          scene.remove(b.line); scene.remove(b.particle); scene.remove(b.particleGlow);
          b.line.geometry.dispose(); b.particle.geometry.dispose(); b.particleGlow.geometry.dispose();
          activeBeams.splice(i, 1);
        }
      }
    }

    // Stars twinkle
    for (let i = 0; i < 20; i++) {
      const idx = Math.floor(Math.random()*5000);
      starCol[idx*3] = 0.3+Math.random()*0.7;
    }
    starsGeo.attributes.color.needsUpdate = true;

    renderer.render(scene, camera);
  }
  animate3D();
}

function renderQuestLog() {
  let html = '';

  // Active Agents + Cron Status
  html += '<div class="quest-2col">';

  // Active Agents
  html += '<div class="panel"><div class="panel-header">ACTIVE AGENTS</div>';
  C.agents.forEach(a => {
    const st = agentState[a.id];
    const dotCl = st.ago < 30 ? 'green' : (st.ago < 120 ? 'yellow' : 'dim');

  });
  html += '</div>';

  // Cron Status
  html += '<div class="panel"><div class="panel-header">CRON STATUS</div>';
  C.crons.forEach(cr => {
    const badge = cr.status === 'ok' ? '<span class="quest-ok">OK</span>' : '<span class="quest-err">ERR</span>';
    html += `<div class="quest-item">${badge}<span style="color:var(--cyan);margin:0 6px">${cr.agent}</span><span>${cr.name}</span><span class="quest-time">Last: ${cr.lastRun}</span></div>`;
  });
  html += '</div></div>';

  // Last Agent Actions
  html += '<div class="panel"><div class="panel-header">LAST AGENT ACTIONS</div>';
  const now = new Date();
  const actions = [];
  C.agents.forEach(a => {
    const t = new Date(now - Math.floor(Math.random()*3600000));
    actions.push({ time: t, agent: a.name, text: randomMsg() });
    const t2 = new Date(now - Math.floor(Math.random()*7200000));
    actions.push({ time: t2, agent: a.name, text: randomMsg() });
  });
  actions.sort((a,b) => b.time - a.time);
  actions.slice(0, 20).forEach(act => {
    const ts = act.time.toTimeString().slice(0,5);
    html += `<div class="action-line"><span class="action-time">${ts}</span><span class="action-agent">[${act.agent}]</span>${act.text}</div>`;
  });
  html += '</div>';

  // Achievements + Recent Changes
  html += '<div class="quest-2col">';

  // Achievements
  html += '<div class="panel"><div class="panel-header">ACHIEVEMENTS</div>';
  const achievements = {
    COORDINATOR: ['Multi-agent orchestration', 'Zero-downtime deploy'],
    DEVELOPER: ['100+ commits', 'CI/CD pipeline', 'Dashboard shipped'],
    RESEARCHER: ['50 reports generated', 'Market analysis v2'],
    SALES: ['3x lead pipeline', '15 leads/day average'],
    CONTENT: ['Social automation', '200+ posts published'],
    SECURITY: ['Zero breaches', 'Compliance audit passed'],
  };
  for (const [agent, items] of Object.entries(achievements)) {
    const a = C.agents.find(ag => ag.name === agent);
    if (!a) continue;
    html += `<div class="achievement-agent">${a.name}</div>`;
    items.forEach(item => {
      html += `<div class="achievement-item">\u2605 ${item}</div>`;
    });
  }
  // fallback for custom agents
  C.agents.forEach(a => {
    if (!achievements[a.name]) {
      html += `<div class="achievement-agent">${a.name}</div>`;
      html += `<div class="achievement-item">\u2605 Agent deployed</div>`;
    }
  });
  html += '</div>';

  // Recent Changes
  html += '<div class="panel"><div class="panel-header">RECENT CHANGES (24H)</div>';
  const fakeFiles = [
    'config.js', 'mission-control.html', 'agents/coordinator/memory.md',
    'cron/jobs.json', 'skills/rate-limit-shield.js', 'workspace/logs/gateway.log',
    'agents/developer/session.jsonl', 'openclaw.json', 'vault.db',
  ];
  for (let i = 0; i < 8; i++) {
    const t = new Date(now - Math.floor(Math.random() * 86400000));
    const ts = t.toTimeString().slice(0,5);
    const f = fakeFiles[i % fakeFiles.length];
    html += `<div class="change-line"><span class="change-time">${ts}</span><span class="change-file">${f}</span></div>`;
  }
  html += '</div></div>';

  $('#questLayout').innerHTML = html;
}
renderQuestLog();

// ═══════════════════════════════════════════════════════════
// TAB 4: ROADMAP
// ═══════════════════════════════════════════════════════════
function renderRoadmap() {
  let html = '<div class="roadmap-title">QUEST LOG \u2014 ROADMAP</div>';

  (C.roadmap || []).forEach(phase => {
    html += `<div class="roadmap-card">
      <div class="roadmap-card-header" style="background:${phase.color}22;border-left:4px solid ${phase.color}">
        <span style="color:${phase.color}">${phase.id}: ${phase.name}</span>
        <span style="color:${phase.color}">${phase.progress}%</span>
      </div>
      <div class="roadmap-progress-bar-outer">
        <div class="roadmap-progress-bar-inner" style="width:${phase.progress}%;background:${phase.color}"></div>
      </div>
      <div class="roadmap-items">`;
    phase.items.forEach(item => {
      const cls = item.status;
      const prefix = item.status === 'pending' ? '-' : '+';
      const assignee = item.assignee ? `<span class="ri-assignee">${item.assignee}</span>` : '';
      let prefixColor = '#5a7a9a';
      if (item.status === 'done') prefixColor = 'var(--green)';
      else if (item.status === 'active') prefixColor = phase.color;
      html += `<div class="roadmap-item ${cls}">
        <span class="ri-prefix" style="color:${prefixColor}">${prefix}</span>
        <span class="ri-text">${item.text}</span>
        ${assignee}
      </div>`;
    });
    html += '</div></div>';
  });

  // Total progress
  const phases = C.roadmap || [];
  const totalProgress = phases.length ? Math.round(phases.reduce((s,p) => s + p.progress, 0) / phases.length) : 0;
  html += `<div class="total-progress">
    <div class="total-progress-label">TOTAL PROGRESS: ${totalProgress}%</div>
    <div class="total-bar-outer">`;
  phases.forEach(p => {
    const w = p.progress / phases.length;
    html += `<div class="total-bar-segment" style="width:${w}%;background:${p.color}"></div>`;
  });
  html += '</div></div>';

  $('#roadmapLayout').innerHTML = html;
}
renderRoadmap();

// ═══════════════════════════════════════════════════════════
// TAB 5: AGENT CHAT
// ═══════════════════════════════════════════════════════════
let chatAgent = null;
const chatHistories = {};

function renderChatSidebar() {
  let html = '';
  C.agents.forEach(a => {
    const dotCl = statusDotClass(a);
    const chTag = (a.channels && a.channels.length) ? `<span class="ch-tag ${channelClass(a.channels[0])}" style="font-size:4px;padding:1px 3px">${a.channels[0]}</span>` : '';
    html += `<div class="chat-sidebar-item" data-agent="${a.id}"><span class="status-dot ${dotCl}"></span><span class="chat-sidebar-name">${a.name}</span>${chTag}</div>`;
  });
  $('#chatSidebar').innerHTML = html;

  $$('.chat-sidebar-item').forEach(item => {
    item.addEventListener('click', () => {
      $$('.chat-sidebar-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      openChat(item.dataset.agent);
    });
  });
}
renderChatSidebar();

function openChat(agentId) {
  chatAgent = C.agents.find(a => a.id === agentId);
  if (!chatAgent) return;
  $('#chatHeader').textContent = chatAgent.name + ' \u2014 ' + chatAgent.role;
  $('#chatPlaceholder').style.display = 'none';
  $('#chatMessages').style.display = 'flex';
  $('#chatInputBar').style.display = 'flex';

  if (!chatHistories[agentId]) {
    chatHistories[agentId] = [
      { sender: chatAgent.name, text: `${chatAgent.name} online. Model: ${chatAgent.model}. Ready for tasks.`, type: 'agent' },
      { sender: chatAgent.name, text: randomMsg(), type: 'agent' },
    ];
  }
  renderChatMessages();
}

function renderChatMessages() {
  if (!chatAgent) return;
  const msgs = chatHistories[chatAgent.id] || [];
  let html = '';
  msgs.forEach(m => {
    html += `<div class="chat-bubble ${m.type}"><div class="sender">${m.sender}</div>${m.text}</div>`;
  });
  const el = $('#chatMessages');
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

$('#chatSendBtn').addEventListener('click', sendChatMessage);
$('#chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendChatMessage(); });

function sendChatMessage() {
  if (!chatAgent) return;
  const input = $('#chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  if (!chatHistories[chatAgent.id]) chatHistories[chatAgent.id] = [];
  chatHistories[chatAgent.id].push({ sender: 'YOU', text, type: 'user' });
  renderChatMessages();

  // Simulate agent reply
  setTimeout(() => {
    const replies = [
      `Understood. Processing: "${text}"`,
      `Task acknowledged. Running ${chatAgent.model} inference...`,
      `Roger that. Executing with ${chatAgent.skills} skills available.`,
      `On it. Current status: ${chatAgent.status}. ETA: ${Math.floor(Math.random()*10)+1}s`,
      `Analyzing request... ${randomMsg()}`,
    ];
    const reply = replies[Math.floor(Math.random() * replies.length)];
    chatHistories[chatAgent.id].push({ sender: chatAgent.name, text: reply, type: 'agent' });
    renderChatMessages();
  }, 800 + Math.random() * 1200);
}

// ═══════════════════════════════════════════════════════════
// SIMULATED ACTIVITY
// ═══════════════════════════════════════════════════════════
function simulateActivity() {
  const activeAgents = C.agents.filter(a => a.status === 'active');
  if (!activeAgents.length) return;
  const a = activeAgents[Math.floor(Math.random() * activeAgents.length)];
  const st = agentState[a.id];
  st.ago = Math.floor(Math.random() * 15);
  st.lastMsg = randomMsg();
  const msgEl = document.getElementById('msg-' + a.id);
  if (msgEl) msgEl.textContent = st.lastMsg;
}
setInterval(simulateActivity, 3000);

// Status dot flicker
setInterval(() => {
  const greenDots = document.querySelectorAll('.status-dot.green');
  if (greenDots.length) {
    const dot = greenDots[Math.floor(Math.random() * greenDots.length)];
    dot.style.animation = 'flickerDot 0.3s ease-in-out';
    setTimeout(() => { dot.style.animation = ''; }, 300);
  }
}, 3000);

// ═══════════════════════════════════════════════════════════
// tsParticles INIT
// ═══════════════════════════════════════════════════════════
(async () => {
  if (typeof tsParticles === 'undefined') return;
  await tsParticles.load('tsparticles', {
    fullScreen: false,
    background: { color: { value: 'transparent' } },
    fpsLimit: 60,
    particles: {
      number: { value: 50, density: { enable: true, area: 800 } },
      color: { value: ['#00d4ff', '#ff6b2b', '#00ff88', '#ffd700'] },
      links: { enable: true, color: '#1e3a5f', distance: 150, opacity: 0.3 },
      move: { enable: true, speed: 0.6, outModes: 'bounce' },
      opacity: { value: { min: 0.2, max: 0.6 } },
      size: { value: { min: 1, max: 3 } },
    },
    detectRetina: true,
  });
})();
</script>
